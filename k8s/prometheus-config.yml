apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
data:
  prometheus.yml: |
    global:
      scrape_interval: 5s

    scrape_configs:
      - job_name: 'order'
        static_configs:
          - targets: ['order-service:5001']

      - job_name: 'tracking'
        static_configs:
          - targets: ['tracking-service:5002']

      - job_name: 'delivery'
        static_configs:
          - targets: ['delivery-service:5003']