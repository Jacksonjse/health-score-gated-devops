name: CI-CD Pipeline

on:
  push:
    branches:
      - main

jobs:

  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Build Docker Images
        run: docker compose build


  test:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v3

      - name: Start Services
        run: docker compose up -d --build

      - name: Wait for services
        run: sleep 30

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install deps
        run: pip install requests

      - name: Run Health Check
        id: health
        run: |
          python health/health_score.py > output.txt
          cat output.txt

          if grep -q "ROLLBACK" output.txt; then
            echo "status=fail" >> $GITHUB_OUTPUT
          else
            echo "status=pass" >> $GITHUB_OUTPUT
          fi

    outputs:
      result: ${{ steps.health.outputs.status }}


  deploy:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Decision Gate
        run: |
          if [ "${{ needs.test.outputs.result }}" = "fail" ]; then
            echo "❌ Deployment Blocked (Rollback)"
            exit 1
          else
            echo "✅ Deployment Approved"
          fi